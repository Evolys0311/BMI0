<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>現代化 BMI 計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body {
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 1rem;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 1.5rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        .status-badge {
            transition: all 0.3s ease;
        }
    </style>
</head>
<body>

    <div class="glass-card w-full max-w-md p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">BMI 健康計算機</h1>
            <p class="text-gray-500 mt-2">輸入您的身高體重，掌握健康狀態</p>
        </div>

        <div class="space-y-6">
            <!-- 身高輸入 -->
            <div>
                <label for="height" class="block text-sm font-medium text-gray-700 mb-1">身高 (公分 cm)</label>
                <input type="number" id="height" placeholder="例如: 175" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <!-- 體重輸入 -->
            <div>
                <label for="weight" class="block text-sm font-medium text-gray-700 mb-1">體重 (公斤 kg)</label>
                <input type="number" id="weight" placeholder="例如: 70" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>

            <!-- 計算按鈕 -->
            <button onclick="calculateBMI()" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg transform active:scale-95 transition-all">
                開始計算
            </button>

            <!-- 結果顯示區 -->
            <div id="resultArea" class="hidden mt-8 p-6 bg-gray-50 rounded-2xl border border-gray-100 text-center animate-fade-in">
                <p class="text-gray-500 text-sm uppercase tracking-wider">您的 BMI 指數</p>
                <div id="bmiValue" class="text-5xl font-extrabold text-indigo-600 my-2">22.5</div>
                <div id="bmiStatus" class="status-badge inline-block px-4 py-1 rounded-full text-white font-semibold text-sm">
                    健康體位
                </div>
                
                <div class="mt-6 pt-6 border-t border-gray-200">
                    <p id="bmiAdvice" class="text-gray-600 text-sm italic">
                        保持良好的飲食與運動習慣，繼續維持喔！
                    </p>
                </div>
            </div>
        </div>

        <!-- 參考表格 -->
        <div class="mt-8 text-xs text-gray-400">
            <p class="text-center">註：BMI 僅供參考，實際健康狀況請諮詢專業醫師。</p>
        </div>
    </div>

    <script>
        function calculateBMI() {
            const heightInput = document.getElementById('height');
            const weightInput = document.getElementById('weight');
            const resultArea = document.getElementById('resultArea');
            const bmiValueDisplay = document.getElementById('bmiValue');
            const bmiStatusDisplay = document.getElementById('bmiStatus');
            const bmiAdviceDisplay = document.getElementById('bmiAdvice');

            const height = parseFloat(heightInput.value);
            const weight = parseFloat(weightInput.value);

            // 簡易驗證
            if (!height || !weight || height <= 0 || weight <= 0) {
                showModal("請輸入正確的身高與體重數值！");
                return;
            }

            // BMI 公式 = 體重(kg) / 身高(m)^2
            const heightInMeters = height / 100;
            const bmi = (weight / (heightInMeters * heightInMeters)).toFixed(1);

            // 顯示結果區域
            resultArea.classList.remove('hidden');
            bmiValueDisplay.innerText = bmi;

            // 判斷狀態
            let status = "";
            let color = "";
            let advice = "";

            if (bmi < 18.5) {
                status = "體重過輕";
                color = "#60a5fa"; // blue-400
                advice = "建議均衡飲食，增加營養攝取並搭配適量運動。";
            } else if (bmi >= 18.5 && bmi < 24) {
                status = "健康體位";
                color = "#34d399"; // emerald-400
                advice = "太棒了！請繼續保持均衡飲食與規律運動。";
            } else if (bmi >= 24 && bmi < 27) {
                status = "體重過重";
                color = "#fbbf24"; // amber-400
                advice = "要注意囉！建議微調飲食並增加有氧運動量。";
            } else {
                status = "肥胖";
                color = "#f87171"; // red-400
                advice = "為了您的健康，建議諮詢醫師或營養師制定減重計畫。";
            }

            bmiStatusDisplay.innerText = status;
            bmiStatusDisplay.style.backgroundColor = color;
            bmiAdviceDisplay.innerText = advice;

            // 平滑滾動到結果
            resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        // 自定義警告視窗 (替代原生 alert)
        function showModal(message) {
            const div = document.createElement('div');
            div.className = "fixed inset-0 flex items-center justify-center z-50 p-4";
            div.innerHTML = `
                <div class="absolute inset-0 bg-black opacity-50"></div>
                <div class="bg-white p-6 rounded-xl shadow-2xl relative z-10 max-w-sm w-full">
                    <h3 class="text-lg font-bold text-gray-800 mb-2">提示</h3>
                    <p class="text-gray-600 mb-4">${message}</p>
                    <button onclick="this.parentElement.parentElement.remove()" class="w-full bg-indigo-600 text-white py-2 rounded-lg">確定</button>
                </div>
            `;
            document.body.appendChild(div);
        }
    </script>
</body>
</html>
